<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>👅 Our Wild World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    :root { --bg: #0F1220; --bg-deep: #0A0C16; --card: #1D1730; --card-2: #241C3A; --rose: #D9A5A0; --gold: #E8C170; --text: #F2E9E4; --muted: #9C8AA5; --border: rgba(232,193,112,0.16); --danger: #C97064; --success: #64C9A2; --radius: 18px; }
    body { margin:0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
    .screen { display:none; height:100vh; align-items:center; justify-content:center; padding:24px; }
    .screen.active { display:flex; }
    .auth-card { width:100%; max-width:400px; background: linear-gradient(180deg, var(--card), var(--card-2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; text-align:center; }
    .field { text-align:left; margin-bottom:16px; }
    .field input, .field select, .field textarea { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background: rgba(0,0,0,0.25); color:var(--text); }
    .btn { width:100%; padding:13px; border-radius:10px; border:none; background: linear-gradient(180deg, var(--rose), #c98b85); cursor:pointer; }
    .btn.gold { background: linear-gradient(180deg, var(--gold), #c99f4d); }
    #appScreen { align-items:stretch; padding:0; }
    .app-layout { display: flex; width: 100vw; height: 100vh; }
    .sidebar { width: 320px; background: var(--bg-deep); border-right: 1px solid var(--border); padding: 20px; }
    .app-wrap { display:flex; flex-direction:column; flex: 1; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding: 12px 20px; border-bottom:1px solid var(--border); height: 70px; }
    .avatar { width:44px; height:44px; border-radius:50%; object-fit:cover; border:1.5px solid var(--gold); }
    .content-panel { flex: 1; display: none; overflow-y: auto; flex-direction: column; }
    .content-panel.active { display: flex; }
    .chat-area { flex:1; overflow-y:auto; padding: 20px; display:flex; flex-direction:column; gap:12px; }
    .msg-row { display:flex; gap:8px; max-width:85%; }
    .msg-row.mine { align-self:flex-end; flex-direction: row-reverse; }
    .msg { padding:10px 14px; border-radius:16px; font-size:0.92rem; }
    .msg-row.mine .msg { background: var(--rose); color:#241C3A; }
    .msg-row.theirs .msg { background: var(--card); border: 1px solid var(--border); }
    .composer-wrapper { border-top:1px solid var(--border); padding: 10px; }
    .composer { display:flex; gap:8px; }
  </style>
</head>
<body>
  <div id="authScreen" class="screen active">
    <div class="auth-card">
      <h1>Our Wild World</h1>
      <div id="loginForm">
        <div class="field"><label>Email</label><input type="email" id="authEmail" /></div>
        <div class="field"><label>Password</label><input type="password" id="authPassword" /></div>
        <button class="btn gold" onclick="handleAuthentication()">Enter Space</button>
      </div>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <div class="app-layout">
      <aside class="sidebar" id="appSidebar">
        <h3>Menu</h3>
        <select id="myMoodSelect" onchange="updateMyMood(this.value)">
          <option value="Normal">Normal</option>
          <option value="Fucking Horny">Fucking Horny</option>
        </select>
      </aside>
      <div class="app-wrap">
        <div class="topbar">
          <div class="profile-meta-block">
            <img src="" id="myAvatarDisplay" class="avatar" onerror="window.handleAvatarError(this, 'User')" />
            <h2 id="topBarTitle">👅 Our Wild World</h2>
          </div>
          <button class="btn" style="width: auto;" onclick="signOutSession()">Logout</button>
        </div>
        <div id="panelChat" class="content-panel active">
          <div class="chat-area" id="chatArea"></div>
          <div class="composer-wrapper">
            <div class="composer">
              <textarea id="chatInput" placeholder="Type a message..."></textarea>
              <button class="btn gold" id="sendBtn" onclick="sendTextMessage()">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = "https://zgniwwnkkrndhvpxfrvg.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnbml3d25ra3JuZGh2cHhmcnZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjI0NDIsImV4cCI6MjA5OTUzODQ0Mn0.S3d0VS3ySLkGdSw0f8I5f8EhkofrHXKwcynEnoTyiF8";
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Explicitly attach to window
    window.handleAvatarError = function(img, name) { 
      img.src = `https://ui-avatars.com/api/?background=241C3A&color=E8C170&name=${encodeURIComponent(name)}`; 
    };

    let currentUser = null;
    let broadcastChannel = null;

    window.handleAuthentication = async function() {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) return alert(error.message);
      currentUser = data.user;
      showScreen('appScreen');
      setupRealtime();
    };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setupRealtime() {
      broadcastChannel = supabaseClient.channel('room-communications', { config: { presence: { key: currentUser.id } } });
      
      // Chaining all listeners BEFORE subscribe()
      broadcastChannel
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => { 
          renderMessage(payload.new); 
        })
        .on('broadcast', { event: 'typing' }, () => {})
        .subscribe();
    }

    window.sendTextMessage = async function() {
      const txt = document.getElementById('chatInput').value;
      if(!txt) return;
      await supabaseClient.from('messages').insert([{ sender_uid: currentUser.id, text: txt }]);
      document.getElementById('chatInput').value = '';
    };

    function renderMessage(msg) {
      const chatArea = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = `msg-row ${msg.sender_uid === currentUser.id ? 'mine' : 'theirs'}`;
      div.innerHTML = `<div class="msg">${msg.text}</div>`;
      chatArea.appendChild(div);
    }

    window.signOutSession = async () => { await supabaseClient.auth.signOut(); location.reload(); };
  </script>
</body>
</html>
